<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Detail - Flashback Terminal</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        h1 { font-size: 28px; color: #fff; }
        h1 a { color: #fff; text-decoration: none; }
        h1 a:hover { color: #4a9eff; }
        .nav-links a {
            color: #4a9eff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }
        .nav-links a:hover { text-decoration: underline; }
        .detail-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .screenshot-container {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .screenshot-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        .screenshot-container .no-image {
            width: 100%;
            height: 400px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 16px;
        }
        .info-panel {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }
        .info-panel h2 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .info-item {
            margin-bottom: 15px;
        }
        .info-item label {
            display: block;
            color: #888;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .info-item span {
            color: #e0e0e0;
            font-size: 14px;
        }
        .info-item a {
            color: #4a9eff;
            text-decoration: none;
        }
        .info-item a:hover {
            text-decoration: underline;
        }
        .text-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .text-content {
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #ccc;
            background: #0a0a0a;
            padding: 15px;
            border-radius: 6px;
            max-height: 400px;
            overflow: auto;
            margin-top: 10px;
        }
        .neighbors-section {
            margin-top: 30px;
        }
        .neighbors-section h2 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .neighbor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .neighbor-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #333;
            transition: transform 0.2s, border-color 0.2s;
        }
        .neighbor-card:hover {
            transform: translateY(-2px);
            border-color: #4a9eff;
        }
        .neighbor-card.center {
            border-color: #4a9eff;
            box-shadow: 0 0 10px rgba(74, 158, 255, 0.3);
        }
        .neighbor-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #0a0a0a;
        }
        .neighbor-card .no-image {
            width: 100%;
            height: 120px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 12px;
        }
        .neighbor-info {
            padding: 10px;
        }
        .neighbor-time {
            color: #888;
            font-size: 11px;
        }
        .neighbor-rel {
            color: #4a9eff;
            font-size: 11px;
            margin-top: 2px;
        }
        .loading, .error {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        .error { color: #ff6b6b; }
        @media (max-width: 900px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">Flashback Terminal</a></h1>
            <div class="nav-links">
                <a href="/">Terminal</a>
                <a href="/timeline">Timeline</a>
            </div>
        </header>

        <div id="content">
            <div class="loading">Loading capture...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';

        // Get capture ID from URL path
        function getCaptureId() {
            const path = window.location.pathname;
            const match = path.match(/\/capture\/(\d+)/);
            return match ? match[1] : null;
        }

        // HTML escape function
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const str = String(text);
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Format timestamp
        function formatDateTime(timestamp) {
            if (!timestamp) return '-';
            return new Date(timestamp).toLocaleString();
        }

        async function loadCapture() {
            const captureId = getCaptureId();
            if (!captureId) {
                document.getElementById('content').innerHTML =
                    '<div class="error">Capture ID not found in URL</div>';
                return;
            }

            try {
                const [detailRes, neighborsRes] = await Promise.all([
                    fetch(`${API_BASE}/captures/by-id/${captureId}`),
                    fetch(`${API_BASE}/captures/by-id/${captureId}/neighbors?before=5&after=5`)
                ]);

                if (detailRes.status === 404) {
                    document.getElementById('content').innerHTML =
                        '<div class="error">Capture not found</div>';
                    return;
                }

                const detail = await detailRes.json();
                const neighbors = await neighborsRes.json();

                renderDetail(detail, neighbors);
            } catch (e) {
                document.getElementById('content').innerHTML =
                    `<div class="error">Error loading capture: ${escapeHtml(e.message)}</div>`;
            }
        }

        function renderDetail(detail, neighbors) {
            const neighborsHtml = neighbors.screenshots.map(n => `
                <div class="neighbor-card ${n.is_center ? 'center' : ''}"
                     onclick="window.location.href='/capture/${n.id}'">
                    ${n.screenshot_url
                        ? `<img src="${escapeHtml(n.screenshot_url)}" loading="lazy">`
                        : `<div class="no-image">No Image</div>`
                    }
                    <div class="neighbor-info">
                        <div class="neighbor-time">${escapeHtml(formatDateTime(n.timestamp))}</div>
                        <div class="neighbor-rel">${n.relative_minutes > 0 ? '+' : ''}${n.relative_minutes}m</div>
                    </div>
                </div>
            `).join('');

            const textSection = detail.ocr_text_full ? `
                <div class="text-section">
                    <h2>Terminal Text</h2>
                    <div class="text-content">${escapeHtml(detail.ocr_text_full)}</div>
                </div>
            ` : '';

            document.getElementById('content').innerHTML = `
                <div class="detail-grid">
                    <div class="screenshot-container">
                        ${detail.screenshot_url
                            ? `<img src="${escapeHtml(detail.screenshot_url)}" alt="Terminal Capture">`
                            : `<div class="no-image">No Screenshot Available</div>`
                        }
                    </div>
                    <div class="info-panel">
                        <h2>Capture Details</h2>
                        <div class="info-item">
                            <label>ID</label>
                            <span>${detail.id}</span>
                        </div>
                        <div class="info-item">
                            <label>Timestamp</label>
                            <span>${escapeHtml(formatDateTime(detail.timestamp))}</span>
                        </div>
                        <div class="info-item">
                            <label>Session</label>
                            <span>${escapeHtml(detail.session_name || 'Unknown')}</span>
                        </div>
                        <div class="info-item">
                            <label>Actions</label>
                            <span><a href="/timeline?time=${new Date(detail.timestamp).getTime() / 1000}">View in Timeline</a></span>
                        </div>
                        <div class="info-item">
                            <label>Has Text</label>
                            <span>${detail.ocr_text_full ? 'Yes' : 'No'}</span>
                        </div>
                        ${textSection}
                    </div>
                </div>
                <div class="neighbors-section">
                    <h2>Timeline Context</h2>
                    <div class="neighbor-grid">${neighborsHtml}</div>
                </div>
            `;
        }

        // Load on page load
        loadCapture();
    </script>
</body>
</html>
