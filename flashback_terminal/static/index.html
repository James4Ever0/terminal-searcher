<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>flashback-terminal</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/xterm.css">
</head>
<body>
    <div id="app">
        <div id="toolbar">
            <div id="tabs"></div>
            <div id="toolbar-buttons">
                <button id="btn-new-tab">+ New Tab</button>
                <button id="btn-search">Search</button>
                <button id="btn-sessions">Sessions</button>
            </div>
        </div>
        <div id="terminal-container"></div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Search Terminal History</h2>
            <input type="text" id="search-input" placeholder="Search...">
            <select id="search-mode">
                <option value="text">Text (BM25)</option>
                <option value="semantic">Semantic</option>
                <option value="hybrid">Hybrid</option>
            </select>
            <select id="search-scope">
                <option value="current">Current Tab</option>
                <option value="all">All Tabs</option>
            </select>
            <button id="btn-do-search">Search</button>
            <div id="search-results"></div>
        </div>
    </div>

    <!-- Sessions Modal -->
    <div id="sessions-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Sessions</h2>
            <div id="sessions-list"></div>
        </div>
    </div>

    <script src="/static/js/xterm.js"></script>
    <script src="/static/js/xterm-addon-fit.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
